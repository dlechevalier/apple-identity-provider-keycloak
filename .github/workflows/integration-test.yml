name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    strategy:
      # Run all matrix jobs even if one fails, to get a full compatibility picture.
      fail-fast: false
      matrix:
        keycloak-version:
          # Integration tests require KC 26.6.0+ (dependencyCurrentProject() API).
          # Compatibility with KC 26.0–26.5 is verified manually — see COMPATIBILITY.md.
          - "26.6.1"

    name: KC ${{ matrix.keycloak-version }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run integration tests against KC ${{ matrix.keycloak-version }}
        run: ./gradlew integrationTest -PkcVersion=${{ matrix.keycloak-version }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-kc-${{ matrix.keycloak-version }}
          path: build/test-results/integrationTest/
